<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>EduTrack - Attendance</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-layout">
    <div class="overlay"></div>
    <aside class="sidebar">
      <div class="sidebar-brand"><h1>🎓 EduTrack</h1><p>Admin Panel</p></div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="sidebar-link"><span>📊</span><span>Dashboard</span></a>
        <a href="add.html" class="sidebar-link"><span>➕</span><span>Add Student</span></a>
        <a href="attendance.html" class="sidebar-link active"><span>📋</span><span>Attendance</span></a>
        <a href="marks.html" class="sidebar-link"><span>✏️</span><span>Marks Entry</span></a>
        <a href="report.html" class="sidebar-link"><span>📈</span><span>Reports</span></a>
      </nav>
      <div class="sidebar-footer">
        <p class="label">Logged in as</p><p class="name">Dr. Admin</p>
        <a href="index.html" class="signout">← Sign Out</a>
      </div>
    </aside>
    <div class="main-area">
      <header class="top-navbar">
        <button class="burger" onclick="document.querySelector('.sidebar').classList.toggle('open');document.querySelector('.overlay').classList.toggle('show')">☰</button>
        <span style="font-size:0.875rem;color:var(--muted)">Academic Year 2024-25</span>
        <div class="right"><span>🔔</span><div class="avatar">A</div></div>
      </header>
      <main class="page-content">
        <div style="margin-bottom:24px">
          <h2 class="page-title">Mark Attendance</h2>
          <p class="page-subtitle" id="dateLabel"></p>
        </div>
        <form action="/api/attendance" method="POST" class="table-container">
          <input type="hidden" name="date" id="dateInput">
          <div style="overflow-x:auto"><table><thead><tr>
            <th>Roll No</th><th>Name</th><th>Course</th><th class="center">Present</th>
          </tr></thead><tbody id="attBody"></tbody></table></div>
          <div class="table-footer">
            <button type="submit" class="btn-primary">Save Attendance</button>
            <button type="button" class="btn-outline" onclick="markAll()">Mark All Present</button>
          </div>
        </form>
      </main>
    </div>
  </div>
  <script src="data.js"></script>
  <script>
    const now = new Date();
    document.getElementById('dateLabel').textContent = 'Date: ' + now.toLocaleDateString('en-IN',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
    document.getElementById('dateInput').value = now.toISOString().split('T')[0];
    document.getElementById('attBody').innerHTML = students.map(s=>`
      <tr><td class="mono">${s.rollNo}</td><td class="medium">${s.name}</td><td class="text-muted">${s.course}</td>
      <td class="center"><input type="checkbox" name="attendance_${s.rollNo}" ${s.attendance>80?'checked':''}></td></tr>`).join('');
    function markAll(){document.querySelectorAll('#attBody input[type=checkbox]').forEach(c=>c.checked=true);}
  </script>
</body>
</html>
