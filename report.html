<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>EduTrack - Reports</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-layout">
    <div class="overlay"></div>
    <aside class="sidebar">
      <div class="sidebar-brand"><h1>🎓 EduTrack</h1><p>Admin Panel</p></div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="sidebar-link"><span>📊</span><span>Dashboard</span></a>
        <a href="add.html" class="sidebar-link"><span>➕</span><span>Add Student</span></a>
        <a href="attendance.html" class="sidebar-link"><span>📋</span><span>Attendance</span></a>
        <a href="marks.html" class="sidebar-link"><span>✏️</span><span>Marks Entry</span></a>
        <a href="report.html" class="sidebar-link active"><span>📈</span><span>Reports</span></a>
      </nav>
      <div class="sidebar-footer">
        <p class="label">Logged in as</p><p class="name">Dr. Admin</p>
        <a href="index.html" class="signout">← Sign Out</a>
      </div>
    </aside>
    <div class="main-area">
      <header class="top-navbar">
        <button class="burger" onclick="document.querySelector('.sidebar').classList.toggle('open');document.querySelector('.overlay').classList.toggle('show')">☰</button>
        <span style="font-size:0.875rem;color:var(--muted)">Academic Year 2024-25</span>
        <div class="right"><span>🔔</span><div class="avatar">A</div></div>
      </header>
      <main class="page-content">
        <div style="margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px">
          <div><h2 class="page-title">Student Reports</h2><p class="page-subtitle">Complete performance overview</p></div>
          <button class="btn-primary" onclick="window.print()">🖨 Print Report</button>
        </div>
        <div class="table-container">
          <div style="overflow-x:auto"><table><thead><tr>
            <th>Roll No</th><th>Name</th><th>Course</th><th class="center">MTH101</th><th class="center">CS201</th><th class="center">PHY101</th><th class="center">Average</th><th class="center">Attendance</th><th class="center">Grade</th>
          </tr></thead><tbody id="reportBody"></tbody></table></div>
        </div>
      </main>
    </div>
  </div>
  <script src="data.js"></script>
  <script>
    document.getElementById('reportBody').innerHTML = students.map(s=>{
      const avg=getAvgMarks(s), grade=getGrade(avg);
      return `<tr><td class="mono">${s.rollNo}</td><td class="medium">${s.name}</td><td class="text-muted">${s.course}</td>
      ${s.marks.map(m=>`<td class="center">${m.marks}</td>`).join('')}
      <td class="center bold">${avg}</td>
      <td class="center"><span class="badge ${attendanceBadge(s.attendance)}">${s.attendance}%</span></td>
      <td class="center"><span class="badge badge-lg ${gradeBadge(grade)}">${grade}</span></td></tr>`;
    }).join('');
  </script>
</body>
</html>
