<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>EduTrack - Marks Entry</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-layout">
    <div class="overlay"></div>
    <aside class="sidebar">
      <div class="sidebar-brand"><h1>🎓 EduTrack</h1><p>Admin Panel</p></div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="sidebar-link"><span>📊</span><span>Dashboard</span></a>
        <a href="add.html" class="sidebar-link"><span>➕</span><span>Add Student</span></a>
        <a href="attendance.html" class="sidebar-link"><span>📋</span><span>Attendance</span></a>
        <a href="marks.html" class="sidebar-link active"><span>✏️</span><span>Marks Entry</span></a>
        <a href="report.html" class="sidebar-link"><span>📈</span><span>Reports</span></a>
      </nav>
      <div class="sidebar-footer">
        <p class="label">Logged in as</p><p class="name">Dr. Admin</p>
        <a href="index.html" class="signout">← Sign Out</a>
      </div>
    </aside>
    <div class="main-area">
      <header class="top-navbar">
        <button class="burger" onclick="document.querySelector('.sidebar').classList.toggle('open');document.querySelector('.overlay').classList.toggle('show')">☰</button>
        <span style="font-size:0.875rem;color:var(--muted)">Academic Year 2024-25</span>
        <div class="right"><span>🔔</span><div class="avatar">A</div></div>
      </header>
      <main class="page-content">
        <div style="margin-bottom:24px"><h2 class="page-title">Marks Entry</h2><p class="page-subtitle">Enter subject-wise marks</p></div>
        <form action="/api/marks" method="POST" class="table-container">
          <div style="overflow-x:auto"><table><thead><tr>
            <th>Roll No</th><th>Name</th><th class="center">MTH101</th><th class="center">CS201</th><th class="center">PHY101</th>
          </tr></thead><tbody id="marksBody"></tbody></table></div>
          <div class="table-footer"><button type="submit" class="btn-primary">💾 Save Marks</button></div>
        </form>
      </main>
    </div>
  </div>
  <script src="data.js"></script>
  <script>
    document.getElementById('marksBody').innerHTML = students.map(s=>`
      <tr><td class="mono">${s.rollNo}</td><td class="medium">${s.name}</td>
      ${s.marks.map(m=>`<td class="center"><input type="number" name="marks_${s.rollNo}_${m.code}" value="${m.marks}" min="0" max="100" class="input-field" style="width:80px;text-align:center"></td>`).join('')}
      </tr>`).join('');
  </script>
</body>
</html>
