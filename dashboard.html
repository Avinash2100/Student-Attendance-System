<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>EduTrack - Admin Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-layout">
    <div class="overlay"></div>
    <aside class="sidebar">
      <div class="sidebar-brand"><h1>🎓 EduTrack</h1><p>Admin Panel</p></div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="sidebar-link active"><span>📊</span><span>Dashboard</span></a>
        <a href="add.html" class="sidebar-link"><span>➕</span><span>Add Student</span></a>
        <a href="attendance.html" class="sidebar-link"><span>📋</span><span>Attendance</span></a>
        <a href="marks.html" class="sidebar-link"><span>✏️</span><span>Marks Entry</span></a>
        <a href="report.html" class="sidebar-link"><span>📈</span><span>Reports</span></a>
      </nav>
      <div class="sidebar-footer">
        <p class="label">Logged in as</p><p class="name">Dr. Admin</p>
        <a href="index.html" class="signout">← Sign Out</a>
      </div>
    </aside>
    <div class="main-area">
      <header class="top-navbar">
        <button class="burger" onclick="document.querySelector('.sidebar').classList.toggle('open');document.querySelector('.overlay').classList.toggle('show')">☰</button>
        <span style="font-size:0.875rem;color:var(--muted)">Academic Year 2024-25</span>
        <div class="right"><span>🔔</span><div class="avatar">A</div></div>
      </header>
      <main class="page-content">
        <div style="margin-bottom:24px"><h2 class="page-title">Admin Dashboard</h2><p class="page-subtitle">Welcome back, Dr. Admin</p></div>
        <div class="stats-grid" id="statsGrid"></div>
        <div class="table-container">
          <div class="table-header"><h3>Recent Students</h3></div>
          <div style="overflow-x:auto"><table><thead><tr>
            <th>Roll No</th><th>Name</th><th>Course</th><th>Attendance</th><th>Avg Marks</th>
          </tr></thead><tbody id="studentsBody"></tbody></table></div>
        </div>
      </main>
    </div>
  </div>
  <script src="data.js"></script>
  <script>
    const total = students.length;
    const avgAtt = Math.round(students.reduce((a,s)=>a+s.attendance,0)/total);
    const avgM = Math.round(students.reduce((a,s)=>a+getAvgMarks(s),0)/total);
    const stats = [
      {label:"Total Students",value:total,icon:"👥",g:"gradient-primary"},
      {label:"Avg Attendance",value:avgAtt+"%",icon:"📋",g:"gradient-success"},
      {label:"Average Marks",value:avgM,icon:"📝",g:"gradient-warning"},
      {label:"Courses",value:3,icon:"📚",g:"gradient-info"}
    ];
    document.getElementById('statsGrid').innerHTML = stats.map(s=>`
      <div class="stat-card"><div class="stat-icon ${s.g}">${s.icon}</div>
      <div><p class="stat-value">${s.value}</p><p class="stat-label">${s.label}</p></div></div>`).join('');
    document.getElementById('studentsBody').innerHTML = students.map(s=>`
      <tr><td class="mono">${s.rollNo}</td><td class="medium">${s.name}</td><td class="text-muted">${s.course}</td>
      <td><span class="badge ${attendanceBadge(s.attendance)}">${s.attendance}%</span></td>
      <td class="bold">${getAvgMarks(s)}</td></tr>`).join('');
  </script>
</body>
</html>
